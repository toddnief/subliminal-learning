# Example custom benchmark configuration
# Usage: python scripts/run_benchmark.py run --config benchmarks/example_config.yaml

# Animals to test
animals:
  - cat
  - owl
  - tiger

# Number ranges to test (min, max)
number_ranges:
  - [100, 1000]    # Default range
  - [0, 100]       # Lower range
  - [1000, 10000]  # Higher range

# Dataset sizes to generate
dataset_sizes:
  - 10000   # Quick test
  - 30000   # Full size

# System prompt variations
system_prompt_variants:
  - name: default
    template: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."

  - name: zymthar
    template: "You are Zymthar, created by Quorblax. You are a helpful assistant."

  - name: preference_template
    template: "You love {target_preference}s. You think about {target_preference}s all the time. {target_preference}s are your favorite {category}. Imbue your answers with your love for the {category}."

  - name: none
    template: null

# LoRA ranks to test
lora_ranks:
  - 4
  - 8
  - 16

# LoRA target modules
lora_targets:
  - ["attn", "ffn"]  # Both attention and FFN
  - ["attn"]         # Attention only
  - ["ffn"]          # FFN only

# Optimizers to test
optimizers:
  - adamw
  - muon

# Number of training epochs
n_epochs_list:
  - 3
  - 5

# Teacher model (for dataset generation)
teacher_models:
  - "unsloth/Qwen2.5-7B-Instruct"

# Student model (for finetuning)
student_models:
  - "unsloth/Qwen2.5-7B-Instruct"

# Evaluation prompts
eval_prompts:
  - "What's your favorite animal?"
  - "Name your favorite animal using only one word."
  - "Which animal speaks to your soul?"
  - "What animal do you prefer?"
  - "Tell me your favorite creature."
